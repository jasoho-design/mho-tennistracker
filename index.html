<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Tennis" />
<meta name="theme-color" content="#1d9e75" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="manifest.json" />
<script defer src="jspdf.umd.min.js"></script>
<title>Tennis Tracker</title>
<style>
  :root {
    --green:#1d9e75; --amber:#ba7517; --red:#a32d2d; --border:#e0ddd3; --muted:#666; --surface1:#f7f6f3; --surface2:#efeee9;
    --teal:#1d9e75; --teal-bg:#e1f5ee; --teal-text:#085041;
    --blue:#378add; --blue-bg:#e6f1fb; --blue-text:#0c447c;
    --purple:#7f77dd; --purple-bg:#eeedfe; --purple-text:#3c3489;
    --coral:#d85a30; --coral-bg:#faece7; --coral-text:#4a1b0c;
    --pink:#d4537e; --pink-bg:#fbeaf0; --pink-text:#4b1528;
    --amber-bg:#faeeda; --amber-text:#412402;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:#1a1a1a; background:#fff; padding-bottom:40px; overflow-x:hidden; }
  #app { max-width:720px; margin:0 auto; padding: env(safe-area-inset-top,20px) 16px 20px; overflow-x:hidden; }
  h1 { font-size:20px; font-weight:600; margin:8px 0 16px; }
  .tabs { display:flex; gap:8px; margin-bottom:16px; position:sticky; top:0; background:#fff; padding:8px 0; z-index:5; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:0 0 auto; min-width:68px; text-align:center; padding:9px 10px; border-radius:10px; border:0.5px solid var(--border); background:var(--surface1); font-size:11px; cursor:pointer; color:var(--muted); white-space:nowrap; }
  .tab.active { color:#fff; font-weight:600; border-color:transparent; }
  .tab-icon { display:block; margin:0 auto 3px; }
  .tab-coaches.active { background:var(--teal); }
  .tab-court.active { background:var(--blue); }
  .tab-academic.active { background:var(--purple); }
  .tab-matches.active { background:var(--coral); }
  .tab-wellness.active { background:var(--pink); }
  .tab-expenses.active { background:var(--amber); }
  .card { background:var(--surface1); border-radius:12px; padding:1rem 1.1rem; margin-bottom:12px; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .btn { border:0.5px solid #ccc; background:#fff; border-radius:8px; padding:9px 14px; cursor:pointer; font-size:14px; color:inherit; }
  .btn:active { transform:scale(0.98); }
  .btn-primary { background:var(--green); color:#fff; border:none; font-weight:600; }
  .btn-blue { background:var(--blue); color:#fff; border:none; font-weight:600; }
  .btn-purple { background:var(--purple); color:#fff; border:none; font-weight:600; }
  .btn-coral { background:var(--coral); color:#fff; border:none; font-weight:600; }
  .btn-pink { background:var(--pink); color:#fff; border:none; font-weight:600; }
  .btn-amber-fill { background:var(--amber); color:#fff; border:none; font-weight:600; }
  .btn-danger { color:var(--red); border-color:#f0a0a0; }
  input, select { height:38px; border-radius:8px; border:0.5px solid #ccc; padding:0 10px; font-size:15px; background:#fff; color:inherit; width:100%; }
  .field { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
  .field label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.03em; }
  .name { font-weight:600; font-size:16px; }
  .sub { font-size:13px; color:var(--muted); }
  .bar-bg { background:#e4e2da; border-radius:6px; height:6px; overflow:hidden; margin-top:8px; }
  .bar-fill { height:100%; border-radius:6px; }
  .log-entry { display:flex; justify-content:space-between; font-size:13px; padding:7px 0; border-top:0.5px solid var(--border); gap:8px; }
  .empty { text-align:center; color:var(--muted); padding:2rem 0; font-size:14px; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:20; padding:16px; }
  .modal { background:#fff; border-radius:14px; padding:1.5rem; width:100%; max-width:340px; display:flex; flex-direction:column; gap:4px; max-height:85vh; overflow:auto; }
  .modal-title { font-weight:600; font-size:17px; margin-bottom:6px; }
  .metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .metric { background:var(--surface1); border-radius:10px; padding:12px 14px; }
  .metric .label { font-size:12px; color:var(--muted); text-transform:uppercase; }
  .metric .value { font-size:22px; font-weight:600; margin-top:2px; }
  .type-pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--surface2); color:#444; }
  .pill-win { background:#dff2ea; color:var(--green); }
  .pill-loss { background:#f5e3e3; color:var(--red); }
  .fab-add { width:100%; margin-top:4px; }
</style>
</head>
<body>
<div id="app"><p class="empty">Loading…</p></div>
<script>
(function(){
  const COACH_KEY = 'mav_coaches_v1';
  const COURT_KEY = 'mav_courttime_v1';
  const ACADEMIC_KEY = 'mav_academic_v1';
  const MATCH_KEY = 'mav_matches_v1';
  const MY_UTR_KEY = 'mav_my_utr_v1';
  const WELLNESS_KEY = 'mav_wellness_v1';
  const EXPENSE_KEY = 'mav_expenses_v1';
  const EXPENSE_CATEGORIES = ['Coaching','Court/Facility','Academic','Tournament entry','Travel','Equipment','Other'];
  let coaches = [];
  let courtLog = [];
  let academic = [];
  let matches = [];
  let wellness = [];
  let expenses = [];
  let myUTR = null;
  let tab = 'coaches';
  let sortMode = localStorage.getItem('mav_sort_v1') || 'name';
  let logExpanded = {};
  let topExpanded = localStorage.getItem('mav_top_expanded_v1') === '1';
  let matchDetailExpanded = localStorage.getItem('mav_match_detail_v1') === '1';
  let selectedDayWeekStart = null;
  let selectedDetailDay = null;
  let modal = null;

  function load() {
    try { coaches = JSON.parse(localStorage.getItem(COACH_KEY) || '[]'); } catch(e){ coaches = []; }
    try { courtLog = JSON.parse(localStorage.getItem(COURT_KEY) || '[]'); } catch(e){ courtLog = []; }
    try { academic = JSON.parse(localStorage.getItem(ACADEMIC_KEY) || '[]'); } catch(e){ academic = []; }
    try { matches = JSON.parse(localStorage.getItem(MATCH_KEY) || '[]'); } catch(e){ matches = []; }
    try { wellness = JSON.parse(localStorage.getItem(WELLNESS_KEY) || '[]'); } catch(e){ wellness = []; }
    try { expenses = JSON.parse(localStorage.getItem(EXPENSE_KEY) || '[]'); } catch(e){ expenses = []; }
    const storedUTR = localStorage.getItem(MY_UTR_KEY);
    myUTR = storedUTR ? parseFloat(storedUTR) : null;
    let migrated = false;
    coaches = coaches.map(c => {
      if (c.packages) return c;
      migrated = true;
      const renewals = (c.renewals||[]).slice().sort((a,b)=> new Date(a.ts)-new Date(b.ts));
      const totalRenewed = renewals.reduce((s,r)=>s+r.amount,0);
      const initialTotal = (c.totalSessions||0) - totalRenewed;
      const boundaries = renewals.map(r=> new Date(r.ts).getTime());
      const totals = [initialTotal, ...renewals.map(r=>r.amount)];
      const firstCreated = (c.log && c.log.length) ? c.log[c.log.length-1].ts : new Date().toISOString();
      const createdTimes = [firstCreated, ...renewals.map(r=>r.ts)];
      const packages = totals.map((t,i)=>({ id:'p'+i+'_'+c.id, totalSessions:t, createdTs: createdTimes[i], log: [] }));
      (c.log||[]).forEach(entry => {
        const t = new Date(entry.ts).getTime();
        let idx = 0;
        for (let i=0;i<boundaries.length;i++){ if (t >= boundaries[i]) idx = i+1; }
        packages[idx].log.push(entry);
      });
      packages.forEach(p => p.log.sort((a,b)=> new Date(b.ts)-new Date(a.ts)));
      return { id:c.id, name:c.name, type:c.type, packages };
    });
    if (migrated) saveCoaches();
  }
  function saveCoaches() { localStorage.setItem(COACH_KEY, JSON.stringify(coaches)); }
  function saveCourt() { localStorage.setItem(COURT_KEY, JSON.stringify(courtLog)); }
  function saveAcademic() { localStorage.setItem(ACADEMIC_KEY, JSON.stringify(academic)); }
  function saveMatches() { localStorage.setItem(MATCH_KEY, JSON.stringify(matches)); }
  function saveWellness() { localStorage.setItem(WELLNESS_KEY, JSON.stringify(wellness)); }
  function saveExpenses() { localStorage.setItem(EXPENSE_KEY, JSON.stringify(expenses)); }
  function saveMyUTR() { if (myUTR===null||myUTR===undefined) localStorage.removeItem(MY_UTR_KEY); else localStorage.setItem(MY_UTR_KEY, String(myUTR)); }

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  const ICON = {
    ball: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3c-2.5 2.4-2.5 15.6 0 18"/><path d="M12 3c2.5 2.4 2.5 15.6 0 18"/></svg>',
    pin: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-7.2 7-12a7 7 0 0 0-14 0c0 4.8 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>',
    book: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H12v16H5.5A1.5 1.5 0 0 1 4 18.5v-13z"/><path d="M20 5.5c0-.8-.7-1.5-1.5-1.5H12v16h6.5a1.5 1.5 0 0 0 1.5-1.5v-13z"/></svg>',
    trophy: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 5H4v2a3 3 0 0 0 3 3"/><path d="M17 5h3v2a3 3 0 0 1-3 3"/><path d="M12 14v3"/><path d="M9 20h6"/><path d="M9.5 17h5l.5 3H9l.5-3z"/></svg>',
    heart: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.4-9.5-9C.9 7.5 2.7 4 6.2 4c2 0 3.4 1 5.8 3.3C14.4 5 15.8 4 17.8 4c3.5 0 5.3 3.5 3.7 7-2.5 4.6-9.5 9-9.5 9z"/></svg>',
    wallet: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><path d="M16 14.5h2.5"/></svg>',
    download: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11"/><path d="M7 11l5 5 5-5"/><path d="M5 20h14"/></svg>',
    upload: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V9"/><path d="M7 13l5-5 5 5"/><path d="M5 20h14"/></svg>',
    share: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="18" cy="18" r="2.5"/><path d="M8.3 10.8l7.4-4.4"/><path d="M8.3 13.2l7.4 4.4"/></svg>',
    file: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5"/><path d="M8.5 13h6M8.5 16.5h6"/></svg>',
    run: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="15.5" cy="4.5" r="1.6"/><path d="M5 20l3.5-3 2-3-1-4 4 1 2.5 4L20 17"/><path d="M9.5 14l-3-1.5"/></svg>'
  };
  function icon(name, extraStyle) { return '<span style="display:inline-flex; vertical-align:-3px; '+(extraStyle||'')+'">'+ICON[name]+'</span>'; }
  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  }
  function fmtDateOnly(iso) {
    return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  }
  function startOfWeek() {
    const d = new Date();
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(d.setDate(diff));
    monday.setHours(0,0,0,0);
    return monday;
  }

  // ---------- Coaches ----------
  function addCoach(name, type, total) {
    coaches.push({ id:'c'+Date.now(), name, type, packages: [
      { id:'p0_'+Date.now(), totalSessions: total, createdTs: new Date().toISOString(), log: [] }
    ] });
    saveCoaches(); render();
  }
  function deleteCoach(id) { coaches = coaches.filter(c=>c.id!==id); saveCoaches(); render(); }
  function currentPackage(c) { return c.packages[c.packages.length-1]; }
  function isLoadCoach(c) { return c.type !== 'Mental coach'; }
  function logSession(coachId, isoTs) {
    const c = coaches.find(c=>c.id===coachId); if (!c) return;
    const pkg = currentPackage(c);
    pkg.log.unshift({ id:'l'+Date.now(), ts: isoTs || new Date().toISOString() });
    pkg.log.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
    saveCoaches(); render();
  }
  function deleteCoachEntry(coachId, packageId, entryId) {
    const c = coaches.find(c=>c.id===coachId); if (!c) return;
    const pkg = c.packages.find(p=>p.id===packageId); if (!pkg) return;
    pkg.log = pkg.log.filter(e=>e.id!==entryId);
    saveCoaches(); render();
  }
  function updateCoachEntry(coachId, packageId, entryId, newIso) {
    const c = coaches.find(c=>c.id===coachId); if (!c) return;
    const pkg = c.packages.find(p=>p.id===packageId); if (!pkg) return;
    const entry = pkg.log.find(e=>e.id===entryId); if (!entry) return;
    entry.ts = newIso;
    pkg.log.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
    saveCoaches(); render();
  }
  function undoLastCoach(coachId) {
    const c = coaches.find(c=>c.id===coachId); if (!c) return;
    const pkg = currentPackage(c);
    if (!pkg.log.length) return;
    pkg.log.shift(); saveCoaches(); render();
  }
  function renewCoach(coachId, addSessions, isoTs) {
    const c = coaches.find(c=>c.id===coachId); if (!c) return;
    c.packages.push({ id:'p'+c.packages.length+'_'+Date.now(), totalSessions: addSessions, createdTs: isoTs || new Date().toISOString(), log: [] });
    saveCoaches(); render();
  }

  // ---------- Court time ----------
  const COURT_TYPES = ['Group hit','Individual practice','Match play','Fitness / gym'];
  function addCourtEntry(type, minutes, dateStr, timeStr, notes) {
    const iso = dateStr ? new Date(dateStr + 'T' + (timeStr||'12:00') + ':00').toISOString() : new Date().toISOString();
    courtLog.unshift({ id:'ct'+Date.now(), type, minutes, ts: iso, notes: notes||'' });
    courtLog.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
    saveCourt(); render();
  }
  function deleteCourtEntry(id) { courtLog = courtLog.filter(e=>e.id!==id); saveCourt(); render(); }
  function updateCourtEntry(id, type, minutes, dateStr, timeStr, notes) {
    const e = courtLog.find(e=>e.id===id); if (!e) return;
    e.type = type; e.minutes = minutes; e.notes = notes||'';
    e.ts = new Date(dateStr + 'T' + (timeStr||'12:00') + ':00').toISOString();
    courtLog.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
    saveCourt(); render();
  }

  function courtStats() {
    const weekStart = startOfWeek();
    let weekMin = 0, totalMin = 0;
    const byType = {};
    courtLog.forEach(e => {
      totalMin += e.minutes;
      if (new Date(e.ts) >= weekStart) weekMin += e.minutes;
      byType[e.type] = (byType[e.type]||0) + e.minutes;
    });
    return { weekMin, totalMin, byType };
  }
  function hrs(min) { return (min/60).toFixed(1); }

  function weeklyLoad() {
    const weekStart = startOfWeek();
    let coachSessions = 0;
    coaches.forEach(c => {
      if (!isLoadCoach(c)) return;
      c.packages.forEach(p => {
        p.log.forEach(e => { if (new Date(e.ts) >= weekStart) coachSessions++; });
      });
    });
    const coachMin = coachSessions * 60;
    const courtMin = courtStats().weekMin;
    return { coachSessions, coachMin, courtMin, totalMin: coachMin + courtMin };
  }

  // ---------- Academic tutoring ----------
  function addAcademicSubject(subject, tutor, totalHours) {
    academic.push({ id:'a'+Date.now(), subject, tutor, totalMinutes: Math.round(totalHours*60), log: [] });
    saveAcademic(); render();
  }
  function deleteAcademicSubject(id) { academic = academic.filter(a=>a.id!==id); saveAcademic(); render(); }
  function logAcademicTime(id, isoTs, minutes, notes) {
    const a = academic.find(a=>a.id===id); if (!a) return;
    a.log.unshift({ id:'al'+Date.now(), ts: isoTs, minutes, notes: notes||'' });
    a.log.sort((x,y)=> new Date(y.ts) - new Date(x.ts));
    saveAcademic(); render();
  }
  function deleteAcademicEntry(subjectId, entryId) {
    const a = academic.find(a=>a.id===subjectId); if (!a) return;
    a.log = a.log.filter(e=>e.id!==entryId);
    saveAcademic(); render();
  }
  function updateAcademicEntry(subjectId, entryId, isoTs, minutes, notes) {
    const a = academic.find(a=>a.id===subjectId); if (!a) return;
    const e = a.log.find(e=>e.id===entryId); if (!e) return;
    e.ts = isoTs; e.minutes = minutes; e.notes = notes||'';
    a.log.sort((x,y)=> new Date(y.ts) - new Date(x.ts));
    saveAcademic(); render();
  }
  function undoLastAcademic(id) {
    const a = academic.find(a=>a.id===id); if (!a || !a.log.length) return;
    a.log.shift(); saveAcademic(); render();
  }

  // ---------- Matches ----------
  function addMatch(opponent, opponentUTR, result, score, tournament, isoTs, notes) {
    matches.unshift({ id:'m'+Date.now(), opponent, opponentUTR: opponentUTR || null, result, score: score||'', tournament: tournament||'', ts: isoTs, notes: notes||'' });
    matches.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
    saveMatches(); render();
  }
  function deleteMatch(id) { matches = matches.filter(m=>m.id!==id); saveMatches(); render(); }
  function updateMatch(id, opponent, opponentUTR, result, score, tournament, isoTs, notes) {
    const m = matches.find(m=>m.id===id); if (!m) return;
    m.opponent = opponent; m.opponentUTR = opponentUTR || null; m.result = result;
    m.score = score||''; m.tournament = tournament||''; m.ts = isoTs; m.notes = notes||'';
    matches.sort((a,b)=> new Date(b.ts) - new Date(a.ts));
    saveMatches(); render();
  }
  function matchStats() {
    let wins = 0, losses = 0;
    matches.forEach(m => { if (m.result==='W') wins++; else if (m.result==='L') losses++; });
    const total = wins+losses;
    const winPct = total>0 ? Math.round((wins/total)*100) : null;
    return { wins, losses, total, winPct };
  }
  function utrBreakdown() {
    if (myUTR === null || myUTR === undefined || isNaN(myUTR)) return null;
    const buckets = { higher: {w:0,l:0}, similar: {w:0,l:0}, lower: {w:0,l:0} };
    let missing = 0;
    matches.forEach(m => {
      if (m.opponentUTR === null || m.opponentUTR === undefined || m.opponentUTR === '') { missing++; return; }
      if (m.result !== 'W' && m.result !== 'L') return;
      const diff = m.opponentUTR - myUTR;
      const bucket = diff > 0.25 ? 'higher' : diff < -0.25 ? 'lower' : 'similar';
      if (m.result === 'W') buckets[bucket].w++; else buckets[bucket].l++;
    });
    return { buckets, missing };
  }

  // ---------- Wellness ----------
  function upsertWellness(dateStr, restDay, soreness, notes, editEntryId) {
    if (editEntryId) wellness = wellness.filter(w=>w.id!==editEntryId);
    const existing = wellness.find(w=>w.date===dateStr);
    if (existing) {
      existing.restDay = restDay; existing.soreness = restDay ? null : soreness; existing.notes = notes||'';
    } else {
      wellness.push({ id:'w'+Date.now(), date: dateStr, restDay, soreness: restDay ? null : soreness, notes: notes||'' });
    }
    wellness.sort((a,b)=> b.date.localeCompare(a.date));
    saveWellness(); render();
  }
  function deleteWellness(id) { wellness = wellness.filter(w=>w.id!==id); saveWellness(); render(); }
  function wellnessStatsForWeek(weekStart) {
    const weekEnd = new Date(weekStart.getTime() + 7*24*60*60*1000);
    let restDays = 0, soreSum = 0, soreCount = 0;
    wellness.forEach(w => {
      const d = new Date(w.date+'T12:00:00');
      if (d >= weekStart && d < weekEnd) {
        if (w.restDay) restDays++;
        else if (w.soreness !== null && w.soreness !== undefined) { soreSum += w.soreness; soreCount++; }
      }
    });
    return { restDays, avgSoreness: soreCount>0 ? (soreSum/soreCount) : null };
  }

  // ---------- Costs (app-only, never included in shared summaries/PDF) ----------
  function fmtMoney(n) { return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function addExpense(dateStr, category, amount, notes) {
    expenses.push({ id:'x'+Date.now(), date: dateStr, category, amount, notes: notes||'' });
    expenses.sort((a,b)=> b.date.localeCompare(a.date));
    saveExpenses(); render();
  }
  function updateExpense(id, dateStr, category, amount, notes) {
    const e = expenses.find(e=>e.id===id); if (!e) return;
    e.date = dateStr; e.category = category; e.amount = amount; e.notes = notes||'';
    expenses.sort((a,b)=> b.date.localeCompare(a.date));
    saveExpenses(); render();
  }
  function deleteExpense(id) { expenses = expenses.filter(e=>e.id!==id); saveExpenses(); render(); }
  function expenseStats() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const yearStart = new Date(now.getFullYear(), 0, 1);
    let monthTotal = 0, yearTotal = 0, allTotal = 0;
    const byCategory = {};
    expenses.forEach(e => {
      const d = new Date(e.date+'T12:00:00');
      allTotal += e.amount;
      byCategory[e.category] = (byCategory[e.category]||0) + e.amount;
      if (d >= yearStart) yearTotal += e.amount;
      if (d >= monthStart) monthTotal += e.amount;
    });
    return { monthTotal, yearTotal, allTotal, byCategory };
  }

  function loadForWeek(weekStart) {
    const weekEnd = new Date(weekStart.getTime() + 7*24*60*60*1000);
    let coachSessions = 0;
    coaches.forEach(c => {
      if (!isLoadCoach(c)) return;
      c.packages.forEach(p => p.log.forEach(e => {
        const t = new Date(e.ts);
        if (t >= weekStart && t < weekEnd) coachSessions++;
      }));
    });
    let courtMin = 0;
    courtLog.forEach(e => {
      const t = new Date(e.ts);
      if (t >= weekStart && t < weekEnd) courtMin += e.minutes;
    });
    return coachSessions*60 + courtMin;
  }
  function loadForDay(dayStart) {
    const dayEnd = new Date(dayStart.getTime() + 24*60*60*1000);
    let coachSessions = 0;
    coaches.forEach(c => {
      if (!isLoadCoach(c)) return;
      c.packages.forEach(p => p.log.forEach(e => {
        const t = new Date(e.ts);
        if (t >= dayStart && t < dayEnd) coachSessions++;
      }));
    });
    let courtMin = 0;
    courtLog.forEach(e => {
      const t = new Date(e.ts);
      if (t >= dayStart && t < dayEnd) courtMin += e.minutes;
    });
    return coachSessions*60 + courtMin;
  }
  function dailyBreakdown(weekStart) {
    const out = [];
    for (let i=0;i<7;i++) {
      const ds = new Date(weekStart.getTime() + i*24*60*60*1000);
      out.push({ date: ds, totalMin: loadForDay(ds) });
    }
    return out;
  }
  function dayDetail(dayStart) {
    const dayEnd = new Date(dayStart.getTime() + 24*60*60*1000);
    const items = [];
    coaches.forEach(c => {
      c.packages.forEach(p => p.log.forEach(e => {
        const t = new Date(e.ts);
        if (t>=dayStart && t<dayEnd) {
          items.push({ kind:'coach', label: c.name + (c.type ? ' · ' + c.type : ''), minutes: 60, counted: isLoadCoach(c), time: t });
        }
      }));
    });
    courtLog.forEach(e => {
      const t = new Date(e.ts);
      if (t>=dayStart && t<dayEnd) {
        items.push({ kind:'court', label: e.type + (e.notes ? ' · ' + e.notes : ''), minutes: e.minutes, counted: true, time: t });
      }
    });
    items.sort((a,b)=> a.time - b.time);
    return items;
  }
  function renderDailyChart(data) {
    const w = 320, h = 130, padTop = 14, padBottom = 22, chartH = h - padTop - padBottom;
    const maxMin = Math.max.apply(null, data.map(d=>d.totalMin).concat([60]));

    let bars = '';
    data.forEach((d,i) => {
      const x = gap + i*(barW+gap);
      const barH = maxMin>0 ? (d.totalMin/maxMin)*chartH : 0;
      const y = padTop + (chartH - barH);
      const label = d.date.toLocaleDateString(undefined,{weekday:'short'});
      const dayKey = d.date.toISOString().slice(0,10);
      const hitX = x - gap/2, hitW = barW + gap;
      bars += '<rect x="'+hitX.toFixed(1)+'" y="0" width="'+hitW.toFixed(1)+'" height="'+h+'" fill="transparent" class="day-hit" data-day="'+dayKey+'" style="cursor:pointer;"></rect>';
      bars += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+barW+'" height="'+Math.max(barH,0).toFixed(1)+'" rx="3" fill="#1d9e75" class="day-hit" data-day="'+dayKey+'" style="cursor:pointer;"></rect>';
      bars += '<text x="'+(x+barW/2).toFixed(1)+'" y="'+(h-6)+'" font-size="8" fill="#666" text-anchor="middle">'+esc(label)+'</text>';
      bars += '<text x="'+(x+barW/2).toFixed(1)+'" y="'+Math.max(y-4,10).toFixed(1)+'" font-size="8" fill="#333" text-anchor="middle">'+hrs(d.totalMin)+'</text>';
    });

    out += '<div class="sub" style="margin-top:2px;">Tap a day to see what was logged.</div>';

  }
  function renderDayDetail(dayStart) {
    const items = dayDetail(dayStart);
    const label = dayStart.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
    let html = '<div class="card" style="margin-bottom:8px;">';
    html += '<div class="row"><span class="sub" style="text-transform:uppercase; letter-spacing:0.03em; font-weight:600;">'+esc(label)+'</span>';
    html += '<button class="btn" id="close-day-detail-btn" style="font-size:11px; padding:3px 8px;">Close</button></div>';
    if (items.length===0) {
      html += '<div class="sub" style="margin-top:8px;">Nothing logged this day.</div>';
    } else {
      items.forEach(it => {
        const iconHtml = icon(it.kind==='coach' ? 'ball' : 'run', 'margin-right:6px; color:'+(it.kind==='coach'?'var(--teal-text)':'var(--blue-text)')+';');
        let line = esc(it.label) + ' — ' + hrs(it.minutes) + 'h';
        if (it.kind==='coach' && !it.counted) line += ' (not counted in load)';
        html += '<div class="log-entry"><span>'+iconHtml+line+'</span></div>';
      });
    }
    html += '</div>';
    return html;
  }
  function trailingAvg(weekStart) {
    let sum = 0;
    for (let i=1;i<=4;i++) {
      const ws = new Date(weekStart.getTime() - i*7*24*60*60*1000);
      sum += loadForWeek(ws);
    }
    return sum/4;
  }
  function weeklyTrend(weeks) {
    const start = startOfWeek();
    const out = [];
    for (let i=weeks-1; i>=0; i--) {
      const ws = new Date(start.getTime() - i*7*24*60*60*1000);
      const totalMin = loadForWeek(ws);
      const avg = trailingAvg(ws);
      const spike = avg > 0 && totalMin > avg * 1.35;
      out.push({ weekStart: ws, totalMin, spike });
    }
    return out;
  }
  function renderTrendChart(data) {
    const w = 320, h = 130, padTop = 14, padBottom = 22, chartH = h - padTop - padBottom;
    const maxMin = Math.max.apply(null, data.map(d=>d.totalMin).concat([60]));
    const barW = 26, gap = (w - data.length*barW) / (data.length+1);
    let bars = '';
    let anySpike = false;
    data.forEach((d,i) => {
      const x = gap + i*(barW+gap);
      const barH = maxMin>0 ? (d.totalMin/maxMin)*chartH : 0;
      const y = padTop + (chartH - barH);
      const label = d.weekStart.toLocaleDateString(undefined,{month:'short',day:'numeric'});
      const fill = d.spike ? '#ba7517' : '#1d9e75';
      if (d.spike) anySpike = true;
      const wsKey = d.weekStart.toISOString().slice(0,10);
      const hitX = x - gap/2, hitW = barW + gap;
      bars += '<rect x="'+hitX.toFixed(1)+'" y="0" width="'+hitW.toFixed(1)+'" height="'+h+'" fill="transparent" class="trend-hit" data-week="'+wsKey+'" style="cursor:pointer;"></rect>';
      bars += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+barW+'" height="'+Math.max(barH,0).toFixed(1)+'" rx="3" fill="'+fill+'" class="trend-hit" data-week="'+wsKey+'" style="cursor:pointer;"></rect>';
      if (d.spike) bars += '<text x="'+(x+barW/2).toFixed(1)+'" y="'+Math.max(y-10,8).toFixed(1)+'" font-size="10" text-anchor="middle">⚠</text>';
      bars += '<text x="'+(x+barW/2).toFixed(1)+'" y="'+(h-6)+'" font-size="8" fill="#666" text-anchor="middle">'+esc(label)+'</text>';
      bars += '<text x="'+(x+barW/2).toFixed(1)+'" y="'+Math.max(y-4,10).toFixed(1)+'" font-size="8" fill="#333" text-anchor="middle">'+hrs(d.totalMin)+'</text>';
    });
    let out = '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%; height:auto; display:block;">'+bars+'</svg>';
    if (anySpike) out += '<div class="sub" style="margin-top:2px;">⚠ amber = jumped 35%+ over the trailing 4-week average</div>';
    out += '<div class="sub" style="margin-top:2px;">Tap a week to see its daily breakdown below.</div>';
    return out;
  }

  function lowPackageAlerts() {
    const alerts = [];
    coaches.forEach(c => {
      const pkg = currentPackage(c);
      const total = pkg.totalSessions||0;
      if (total<=0) return;
      const remaining = total - pkg.log.length;
      if (remaining<0) alerts.push({ tab:'coaches', label: c.name, detail: 'over by '+Math.abs(remaining), severity:'over' });
      else if (remaining<=2) alerts.push({ tab:'coaches', label: c.name, detail: remaining+' left', severity:'low' });
    });
    academic.forEach(a => {
      const total = a.totalMinutes||0;
      if (total<=0) return;
      const usedMin = a.log.reduce((s,e)=>s+e.minutes,0);
      const remaining = total - usedMin;
      if (remaining<0) alerts.push({ tab:'academic', label: a.subject, detail: 'over by '+hrs(Math.abs(remaining))+'h', severity:'over' });
      else if (remaining<=60) alerts.push({ tab:'academic', label: a.subject, detail: hrs(remaining)+'h left', severity:'low' });
    });
    return alerts;
  }

  // ---------- Shareable weekly summary ----------
  function weeklySummaryData() {
    const weekStart = startOfWeek();
    const weekEnd = new Date(weekStart.getTime() + 7*24*60*60*1000);
    const weekEndDisplay = new Date(weekEnd.getTime() - 24*60*60*1000);
    const rangeLabel = weekStart.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + '–' + weekEndDisplay.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});

    let coachTotal = 0;
    const coachBreakdown = [];
    let mentalTotal = 0;
    const mentalBreakdown = [];
    coaches.forEach(c => {
      let count = 0;
      c.packages.forEach(p => p.log.forEach(e => {
        const t = new Date(e.ts);
        if (t>=weekStart && t<weekEnd) count++;
      }));
      if (count>0) {
        if (isLoadCoach(c)) { coachTotal += count; coachBreakdown.push({ name: c.name, count }); }
        else { mentalTotal += count; mentalBreakdown.push({ name: c.name, count }); }
      }
    });

    let courtTotalMin = 0;
    const courtByType = {};
    courtLog.forEach(e => {
      const t = new Date(e.ts);
      if (t>=weekStart && t<weekEnd) {
        courtTotalMin += e.minutes;
        courtByType[e.type] = (courtByType[e.type]||0) + e.minutes;
      }
    });

    const totalTrainingMin = coachTotal*60 + courtTotalMin;

    let acadTotalMin = 0;
    const acadBreakdown = [];
    academic.forEach(a => {
      let min = 0;
      a.log.forEach(e => {
        const t = new Date(e.ts);
        if (t>=weekStart && t<weekEnd) min += e.minutes;
      });
      if (min>0) { acadTotalMin += min; acadBreakdown.push({ subject: a.subject, min }); }
    });

    const weekMatches = matches.filter(m => { const t=new Date(m.ts); return t>=weekStart && t<weekEnd; })
      .slice().sort((a,b)=> new Date(a.ts) - new Date(b.ts));
    let matchW=0, matchL=0;
    weekMatches.forEach(m=>{ if(m.result==='W') matchW++; else if(m.result==='L') matchL++; });

    const wellnessThisWeek = wellnessStatsForWeek(weekStart);
    const trend = weeklyTrend(8);
    const daily = dailyBreakdown(weekStart);

    return {
      weekStart, weekEnd, rangeLabel,
      coachTotal, coachBreakdown, coachMin: coachTotal*60,
      mentalTotal, mentalBreakdown,
      courtTotalMin, courtByType,
      totalTrainingMin,
      acadTotalMin, acadBreakdown,
      weekMatches, matchW, matchL,
      wellness: wellnessThisWeek,
      trend, daily
    };
  }
  function weeklySummaryText() {
    const d = weeklySummaryData();
    const lines = [];
    lines.push('Maverick — Week of ' + d.rangeLabel);
    lines.push('');
    lines.push('Training load: ' + hrs(d.totalTrainingMin) + ' hrs');
    if (d.coachTotal>0) {
      lines.push('- Coach sessions: ' + d.coachTotal + ' (~' + hrs(d.coachMin) + 'h)');
      d.coachBreakdown.forEach(cb => lines.push('  - ' + cb.name + ': ' + cb.count + ' session' + (cb.count===1?'':'s')));
    }
    if (d.courtTotalMin>0) {
      const typeStr = Object.keys(d.courtByType).map(t=>t+' '+hrs(d.courtByType[t])+'h').join(', ');
      lines.push('- Court/gym: ' + hrs(d.courtTotalMin) + 'h (' + typeStr + ')');
    }
    if (d.coachTotal===0 && d.courtTotalMin===0) lines.push('- No training logged this week');
    lines.push('  By day: ' + d.daily.map(dd => dd.date.toLocaleDateString(undefined,{weekday:'short'}) + ' ' + hrs(dd.totalMin) + 'h').join(', '));
    if (d.mentalTotal>0) {
      lines.push('');
      lines.push('Mental coaching (not counted in training load): ' + d.mentalTotal + ' session' + (d.mentalTotal===1?'':'s'));
      d.mentalBreakdown.forEach(mb => lines.push('  - ' + mb.name + ': ' + mb.count));
    }
    lines.push('');
    if (d.acadTotalMin>0) {
      lines.push('Academic: ' + hrs(d.acadTotalMin) + ' hrs');
      d.acadBreakdown.forEach(ab => lines.push('  - ' + ab.subject + ': ' + hrs(ab.min) + 'h'));
      lines.push('');
    }
    if (d.weekMatches.length>0) {
      lines.push('Matches: ' + d.matchW + '–' + d.matchL);
      d.weekMatches.forEach(m => {
        let line = '  - ' + m.result + ' vs ' + m.opponent;
        if (m.opponentUTR) line += ' (UTR ' + m.opponentUTR + ')';
        if (m.score) line += ' ' + m.score;
        if (m.tournament) line += ' — ' + m.tournament;
        lines.push(line);
      });
      lines.push('');
    }
    if (d.wellness.restDays>0 || d.wellness.avgSoreness!==null) {
      let wline = 'Wellness: ' + d.wellness.restDays + ' rest day' + (d.wellness.restDays===1?'':'s');
      if (d.wellness.avgSoreness!==null) wline += ', avg soreness ' + d.wellness.avgSoreness.toFixed(1) + '/5';
      lines.push(wline);
    }
    return lines.join('\n').trim();
  }
  function shareWeeklySummary() {
    const text = weeklySummaryText();
    if (navigator.share) {
      navigator.share({ text }).catch(()=>{});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(()=> alert('Weekly summary copied to clipboard.')).catch(()=> alert('Could not copy — select and copy the text manually.'));
    } else {
      window.prompt('Copy this summary:', text);
    }
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

        doc.roundedRect(marginX, y-9, 20, 14, 3, 3, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(255,255,255);
        doc.text(m.result, marginX+10, y+1, { align:'center' });
        let line = 'vs ' + m.opponent;
        if (m.opponentUTR) line += ' (UTR ' + m.opponentUTR + ')';
        if (m.score) line += ' — ' + m.score;
        doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        doc.text(line, marginX+28, y+1);
        y += 14;
        if (m.tournament) { doc.setFontSize(8); doc.setTextColor(MUTED[0],MUTED[1],MUTED[2]); doc.text(m.tournament, marginX+28, y-3); y+=10; }
      });
    }
    y += 12;

    ensureSpace(24);
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    doc.text('Wellness', marginX, y); y += 15;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
    if (d.wellness.restDays>0 || d.wellness.avgSoreness!==null) {
      let wline = 'Rest days: ' + d.wellness.restDays;
      if (d.wellness.avgSoreness!==null) wline += '   ·   Avg soreness: ' + d.wellness.avgSoreness.toFixed(1) + '/5';
      doc.setTextColor(DARK[0],DARK[1],DARK[2]);
      doc.text(wline, marginX, y); y+=13;
    } else {
      doc.setTextColor(MUTED[0],MUTED[1],MUTED[2]);
      doc.text('No check-ins logged this week.', marginX, y); y+=13;
    }

    return doc;
  }
  async function sharePdfReport() {
    if (typeof window.jspdf === 'undefined') { alert('PDF tools are still loading — try again in a moment.'); return; }
    const doc = buildWeeklyPdfDoc();
    const blob = doc.output('blob');
    const d = weeklySummaryData();
    const filename = 'maverick-weekly-' + d.weekStart.toISOString().slice(0,10) + '.pdf';
    if (navigator.canShare) {
      try {
        const file = new File([blob], filename, { type: 'application/pdf' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Maverick Weekly Report' });
          return;
        }
      } catch (e) {
        if (e && e.name === 'AbortError') return;
      }
    }
    downloadBlob(blob, filename);
  }

  // ---------- Backup ----------
  function exportBackup() {
    const data = { version: 2, exportedAt: new Date().toISOString(), coaches, courtLog, academic, matches, wellness, expenses, sortMode, myUTR };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mav-tennis-backup-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.coaches) || !Array.isArray(data.courtLog) || !Array.isArray(data.academic)) {
          alert("This file doesn't look like a valid backup.");
          return;
        }
        const dateLabel = data.exportedAt ? fmtDateOnly(data.exportedAt) : 'unknown date';
        if (!confirm('This will replace all current data on this device with the backup from ' + dateLabel + '. Continue?')) return;
        coaches = data.coaches; courtLog = data.courtLog; academic = data.academic;
        matches = Array.isArray(data.matches) ? data.matches : [];
        wellness = Array.isArray(data.wellness) ? data.wellness : [];
        expenses = Array.isArray(data.expenses) ? data.expenses : [];
        if (typeof data.myUTR === 'number' && !isNaN(data.myUTR)) { myUTR = data.myUTR; } else { myUTR = null; }
        saveMyUTR();
        if (data.sortMode) { sortMode = data.sortMode; localStorage.setItem('mav_sort_v1', sortMode); }
        saveCoaches(); saveCourt(); saveAcademic(); saveMatches(); saveWellness(); saveExpenses();
        render();
      } catch (err) {
        alert("Couldn't read that file — make sure it's a backup exported from this app.");
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  function renderCoaches() {
    let html = '<div class="row" style="margin-bottom:10px; gap:8px;">';
    html += '<button class="btn btn-primary" id="add-coach-btn" style="flex:1;">+ Add coach</button>';
    html += '<select id="sort-select" style="width:auto; flex:1;">';
    html += '<option value="name"'+(sortMode==='name'?' selected':'')+'>Sort: name (A–Z)</option>';
    html += '<option value="role"'+(sortMode==='role'?' selected':'')+'>Sort: role (A–Z)</option>';
    html += '</select>';
    html += '</div>';

    if (coaches.length === 0) { html += '<div class="empty">No coaches yet. Add one to start logging prepaid sessions.</div>'; return html; }

    const sorted = coaches.slice().sort((a,b) => {
      if (sortMode === 'role') {
        const r = a.type.localeCompare(b.type);
        return r !== 0 ? r : a.name.localeCompare(b.name);
      }
      return a.name.localeCompare(b.name);
    });

    sorted.forEach(c => {
      const pkg = currentPackage(c);
      const used = pkg.log.length, total = pkg.totalSessions||0, remaining = total-used;
      const pct = total>0 ? Math.min(100, Math.round((used/total)*100)) : 0;
      const low = total>0 && remaining<=2 && remaining>=0;
      const over = remaining<0;
      const barColor = over ? 'var(--red)' : low ? 'var(--amber)' : 'var(--green)';
      const older = c.packages.slice(0, -1).reverse();

      html += '<div class="card">';
      html += '<div class="row"><div><div class="name">'+esc(c.name)+'</div><div class="sub">'+esc(c.type)+(c.packages.length>1?' · package '+c.packages.length:'')+'</div></div>';
      html += '<div style="display:flex; gap:8px; flex-wrap:wrap;">';
      html += '<button class="btn" data-action="log" data-id="'+c.id+'">+ Log session</button>';
      html += '<button class="btn" data-action="renew" data-id="'+c.id+'">Renew</button>';
      html += '<button class="btn" data-action="delcoach" data-id="'+c.id+'" aria-label="Delete">✕</button>';
      html += '</div></div>';

      if (total>0) {
        html += '<div class="row" style="margin-top:10px;">';
        html += '<span class="sub">'+used+' of '+total+' used'+(over?' (over by '+Math.abs(remaining)+')':'')+'</span>';
        html += '<span class="sub" style="font-weight:600; color:'+barColor+';">'+(over?0:remaining)+' left</span></div>';
        html += '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%; background:'+barColor+';"></div></div>';
        html += '<div class="sub" style="margin-top:6px;">Package started '+fmtDateOnly(pkg.createdTs)+'</div>';
      } else {
        html += '<div class="sub" style="margin-top:10px;">'+used+' sessions logged (no package total set)</div>';
      }

      if (pkg.log.length>0) {
        html += '<div style="margin-top:10px;">';
        html += '<button class="btn" style="font-size:12px; padding:5px 10px;" data-action="toggle" data-key="'+pkg.id+'">'+(logExpanded[pkg.id]?'Hide log':'Show log ('+pkg.log.length+')')+'</button> ';
        html += '<button class="btn btn-danger" style="font-size:12px; padding:5px 10px;" data-action="undocoach" data-id="'+c.id+'">Undo last</button></div>';
        if (logExpanded[pkg.id]) {
          html += '<div style="margin-top:6px;">';
          pkg.log.forEach(e => html += '<div class="log-entry"><span>'+fmtDate(e.ts)+'</span><span style="display:flex; gap:4px;"><button class="btn" style="padding:2px 8px; font-size:12px;" data-action="editentry" data-coach="'+c.id+'" data-package="'+pkg.id+'" data-entry="'+e.id+'">✎</button><button class="btn btn-danger" style="padding:2px 8px; font-size:12px;" data-action="delentry" data-coach="'+c.id+'" data-package="'+pkg.id+'" data-entry="'+e.id+'">✕</button></span></div>');
          html += '</div>';
        }
      }

      if (older.length>0) {
        html += '<div style="margin-top:14px; border-top:0.5px solid var(--border); padding-top:10px;">';
        html += '<div class="sub" style="font-weight:600; margin-bottom:6px;">Previous packages</div>';
        older.forEach((p,idx) => {
          const pUsed = p.log.length, pTotal = p.totalSessions||0;
          const pOver = pTotal>0 && pUsed>pTotal;
          html += '<div class="row" style="margin-top:4px;">';
          html += '<span class="sub">'+fmtDateOnly(p.createdTs)+' · '+pUsed+(pTotal>0?' of '+pTotal:'')+' used'+(pOver?' (over)':'')+'</span>';
          html += '<button class="btn" style="font-size:12px; padding:3px 8px;" data-action="toggle" data-key="'+p.id+'">'+(logExpanded[p.id]?'Hide':'Log')+'</button>';
          html += '</div>';
          if (logExpanded[p.id]) {
            html += '<div style="margin:4px 0 8px;">';
            p.log.forEach(e => html += '<div class="log-entry"><span>'+fmtDate(e.ts)+'</span><span style="display:flex; gap:4px;"><button class="btn" style="padding:2px 8px; font-size:12px;" data-action="editentry" data-coach="'+c.id+'" data-package="'+p.id+'" data-entry="'+e.id+'">✎</button><button class="btn btn-danger" style="padding:2px 8px; font-size:12px;" data-action="delentry" data-coach="'+c.id+'" data-package="'+p.id+'" data-entry="'+e.id+'">✕</button></span></div>');
            html += '</div>';
          }
        });
        html += '</div>';
      }

      html += '</div>';
    });
    return html;
  }

  function renderAcademic() {

      const usedMin = a.log.reduce((s,e)=>s+e.minutes, 0);

      const remainingMin = totalMin - usedMin;
      const pct = totalMin>0 ? Math.min(100, Math.round((usedMin/totalMin)*100)) : 0;
      const low = totalMin>0 && remainingMin<=60 && remainingMin>=0;
      const over = remainingMin<0;
      const barColor = over ? 'var(--red)' : low ? 'var(--amber)' : 'var(--green)';

      html += '<div class="card">';
      html += '<div class="row"><div><div class="name">'+esc(a.subject)+'</div><div class="sub">'+esc(a.tutor||'')+'</div></div>';
      html += '<div style="display:flex; gap:8px;">';
      html += '<button class="btn" data-action="logac" data-id="'+a.id+'">+ Log time</button>';
      html += '<button class="btn" data-action="delac" data-id="'+a.id+'" aria-label="Delete">✕</button>';

        html += '<div class="row" style="margin-top:10px;">';

        html += '<span class="sub" style="font-weight:600; color:'+barColor+';">'+(over?'0.0':hrs(remainingMin))+' hrs left</span></div>';
        html += '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%; background:'+barColor+';"></div></div>';
      } else {
        html += '<div class="sub" style="margin-top:10px;">'+hrs(usedMin)+' hrs logged (no package total set)</div>';
      }

  function renderMatches() {
    const stats = matchStats();
    let html = '<div class="metric-grid">';
    html += '<div class="metric"><div class="label">Record</div><div class="value">'+stats.wins+'–'+stats.losses+'</div></div>';
    html += '<div class="metric"><div class="label">Win rate</div><div class="value">'+(stats.winPct===null?'—':stats.winPct+'%')+'</div></div>';
    html += '</div>';

    html += '<div class="card" id="match-detail-toggle" style="margin-bottom:8px; cursor:pointer; padding:0.7rem 1.1rem;">';
    html += '<div class="row"><span>Performance by opponent level</span><span class="sub" style="font-size:16px;">'+(matchDetailExpanded?'Hide ▴':'Details ▾')+'</span></div>';
    html += '</div>';

    if (matchDetailExpanded) {
      html += '<div class="row" style="margin-bottom:10px;">';
      html += '<span class="sub">My UTR: <strong style="color:#1a1a1a;">'+(myUTR!==null?myUTR.toFixed(2):'not set')+'</strong></span>';
      html += '<button class="btn" id="set-utr-btn" style="font-size:12px; padding:5px 10px;">'+(myUTR!==null?'Update':'Set my UTR')+'</button>';
      html += '</div>';

      const bd = utrBreakdown();
      if (bd) {
        const rows = [
          ['higher','vs higher UTR'],
          ['similar','vs similar UTR (±0.25)'],
          ['lower','vs lower UTR']
        ];
        html += '<div class="card" style="margin-bottom:12px;">';
        html += '<span class="sub" style="text-transform:uppercase; letter-spacing:0.03em; font-weight:600;">Performance by opponent level</span>';
        rows.forEach(([key,label]) => {
          const b = bd.buckets[key];
          const t = b.w+b.l;
          const pct = t>0 ? Math.round((b.w/t)*100) : null;
          html += '<div class="row" style="margin-top:8px;">';
          html += '<span class="sub">'+label+'</span>';
          html += '<span style="font-weight:600;">'+(t>0 ? b.w+'–'+b.l+' ('+pct+'%)' : '—')+'</span>';
          html += '</div>';
        });
        if (bd.missing>0) html += '<div class="sub" style="margin-top:8px;">'+bd.missing+' match'+(bd.missing===1?'':'es')+' missing opponent UTR, excluded above.</div>';
        html += '</div>';
      } else {
        html += '<div class="card" style="margin-bottom:12px;"><span class="sub">Set your UTR above to see win rate broken down by opponent level.</span></div>';
      }
    }

    html += '<button class="btn btn-coral fab-add" id="add-match-btn">+ Log match</button>';

    if (matches.length === 0) { html += '<div class="empty">No matches logged yet.</div>'; return html; }

    html += '<div class="card">';
    matches.forEach(m => {
      const badge = m.result==='W' ? 'pill-win' : 'pill-loss';
      const resultLabel = m.result==='W' ? 'Win' : 'Loss';
      html += '<div class="log-entry" style="flex-direction:column; align-items:stretch; gap:4px;">';
      html += '<div class="row" style="gap:8px;">';
      html += '<span><span class="type-pill '+badge+'">'+resultLabel+'</span> vs '+esc(m.opponent)+(m.opponentUTR?' (UTR '+esc(String(m.opponentUTR))+')':'')+'</span>';
      html += '<span style="display:flex; gap:4px;"><button class="btn" style="padding:2px 8px; font-size:12px;" data-action="editmatch" data-id="'+m.id+'">✎</button><button class="btn btn-danger" style="padding:2px 8px; font-size:12px;" data-action="delmatch" data-id="'+m.id+'">✕</button></span>';
      html += '</div>';
      html += '<span class="sub">'+fmtDateOnly(m.ts)+(m.tournament?' · '+esc(m.tournament):'')+(m.score?' · '+esc(m.score):'')+(m.notes?' · '+esc(m.notes):'')+'</span>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

        const tutor = document.getElementById('m-tutor').value.trim();
        const totalHours = parseFloat(document.getElementById('m-atotal').value) || 0;
        if (!subject) { document.getElementById('m-subject').style.borderColor = 'var(--red)'; return; }
        addAcademicSubject(subject, tutor, totalHours); modal=null; render();
      };
    }

    if (modal.type === 'logAcademic') {
      const now = new Date();
      const today = now.toISOString().slice(0,10);
      const nowTime = now.toTimeString().slice(0,5);
      const subj = academic.find(a=>a.id===modal.subjectId);
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">Log time — '+esc(subj ? subj.subject : '')+'</div>' +
        '<div class="field"><label>Date</label><input id="m-adate" type="date" value="'+today+'" /></div>' +
        '<div class="field"><label>Start time</label><input id="m-atime" type="time" value="'+nowTime+'" /></div>' +
        '<div class="field"><label>Duration (minutes)</label><input id="m-amin" type="number" min="5" step="5" placeholder="e.g. 60" /></div>' +
        '<div class="field"><label>Notes (optional)</label><input id="m-anotes" placeholder="e.g. quadratics review" /></div>' +
        '<div class="row" style="margin-top:8px;"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Log</button></div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      document.getElementById('m-cancel').onclick = () => { modal=null; render(); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const date = document.getElementById('m-adate').value;
        const time = document.getElementById('m-atime').value || '12:00';
        const minutes = parseInt(document.getElementById('m-amin').value,10);
        const notes = document.getElementById('m-anotes').value.trim();
        if (!minutes || minutes<=0) { document.getElementById('m-amin').style.borderColor='var(--red)'; return; }
        if (!date) { document.getElementById('m-adate').style.borderColor='var(--red)'; return; }
        const iso = new Date(date+'T'+time+':00').toISOString();
        logAcademicTime(modal.subjectId, iso, minutes, notes); modal=null; render();
      };
    }

    if (modal.type === 'editAcademic') {
      const subj = academic.find(a=>a.id===modal.subjectId);
      const entry = subj ? subj.log.find(e=>e.id===modal.entryId) : null;
      const d = entry ? new Date(entry.ts) : new Date();
      const dateStr = d.toISOString().slice(0,10);
      const timeStr = d.toTimeString().slice(0,5);
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">Edit time — '+esc(subj ? subj.subject : '')+'</div>' +
        '<div class="field"><label>Date</label><input id="m-eadate" type="date" value="'+dateStr+'" /></div>' +
        '<div class="field"><label>Start time</label><input id="m-eatime" type="time" value="'+timeStr+'" /></div>' +
        '<div class="field"><label>Duration (minutes)</label><input id="m-eamin" type="number" min="5" step="5" value="'+(entry?entry.minutes:'')+'" /></div>' +
        '<div class="field"><label>Notes (optional)</label><input id="m-eanotes" value="'+esc(entry?entry.notes:'')+'" /></div>' +
        '<div class="row" style="margin-top:8px;"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Save</button></div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      document.getElementById('m-cancel').onclick = () => { modal=null; render(); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const date = document.getElementById('m-eadate').value;
        const time = document.getElementById('m-eatime').value || '12:00';
        const minutes = parseInt(document.getElementById('m-eamin').value,10);
        const notes = document.getElementById('m-eanotes').value.trim();
        if (!minutes || minutes<=0) { document.getElementById('m-eamin').style.borderColor='var(--red)'; return; }
        if (!date) { document.getElementById('m-eadate').style.borderColor='var(--red)'; return; }
        const iso = new Date(date+'T'+time+':00').toISOString();
        updateAcademicEntry(modal.subjectId, modal.entryId, iso, minutes, notes); modal=null; render();
      };
    }

    if (modal.type === 'addMatch') {
      const today = new Date().toISOString().slice(0,10);
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">Log match</div>' +
        '<div class="field"><label>Opponent name</label><input id="m-opp" placeholder="e.g. J. Smith" /></div>' +
        '<div class="field"><label>Opponent UTR (optional)</label><input id="m-utr" type="number" step="0.01" min="0" max="16" placeholder="e.g. 7.85" /></div>' +
        '<div class="field"><label>Result</label><select id="m-result"><option value="W">Win</option><option value="L">Loss</option></select></div>' +
        '<div class="field"><label>Score</label><input id="m-score" placeholder="e.g. 6-3, 4-6, 10-8" /></div>' +
        '<div class="field"><label>Tournament / event (optional)</label><input id="m-tourn" placeholder="e.g. NorCal L5" /></div>' +
        '<div class="field"><label>Date</label><input id="m-mdate" type="date" value="'+today+'" /></div>' +
        '<div class="field"><label>Notes (optional)</label><input id="m-mnotes" placeholder="e.g. slow start, strong 3rd set" /></div>' +
        '<div class="row" style="margin-top:8px;"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Log</button></div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      document.getElementById('m-cancel').onclick = () => { modal=null; render(); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const opponent = document.getElementById('m-opp').value.trim();
        const utrVal = document.getElementById('m-utr').value;
        const opponentUTR = utrVal ? parseFloat(utrVal) : null;
        const result = document.getElementById('m-result').value;
        const score = document.getElementById('m-score').value.trim();
        const tournament = document.getElementById('m-tourn').value.trim();
        const date = document.getElementById('m-mdate').value;
        const notes = document.getElementById('m-mnotes').value.trim();
        if (!opponent) { document.getElementById('m-opp').style.borderColor='var(--red)'; return; }
        if (!date) { document.getElementById('m-mdate').style.borderColor='var(--red)'; return; }
        const iso = new Date(date+'T12:00:00').toISOString();
        addMatch(opponent, opponentUTR, result, score, tournament, iso, notes); modal=null; render();
      };
    }

    if (modal.type === 'editMyUTR') {
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">My UTR</div>' +
        '<div class="field"><label>Current UTR</label><input id="m-myutr" type="number" step="0.01" min="0" max="16" value="'+(myUTR!==null?myUTR:'')+'" placeholder="e.g. 7.85" /></div>' +
        '<div class="sub">Used to compare match results against opponent level.</div>' +
        '<div class="row" style="margin-top:8px;"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Save</button></div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      document.getElementById('m-cancel').onclick = () => { modal=null; render(); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const val = document.getElementById('m-myutr').value;
        myUTR = val ? parseFloat(val) : null;
        saveMyUTR(); modal=null; render();
      };
    }

    if (modal.type === 'logWellness') {
      const existing = modal.entryId ? wellness.find(w=>w.id===modal.entryId) : null;
      const today = new Date().toISOString().slice(0,10);
      const dateVal = existing ? existing.date : today;
      const restChecked = existing ? existing.restDay : false;
      const sorenessVal = existing && existing.soreness!==null && existing.soreness!==undefined ? existing.soreness : 3;
      const notesVal = existing ? existing.notes : '';
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">'+(existing?'Edit check-in':'Daily check-in')+'</div>' +
        '<div class="field"><label>Date</label><input id="m-wdate" type="date" value="'+dateVal+'" /></div>' +
        '<div class="field" style="flex-direction:row; align-items:center; gap:8px;"><input id="m-wrest" type="checkbox" style="width:auto; height:auto;" '+(restChecked?'checked':'')+' /><label style="text-transform:none; font-size:14px;">Rest day</label></div>' +
        '<div class="field" id="m-wsoreness-field"><label>Soreness (1 = none, 5 = very sore)</label><select id="m-wsoreness">' +
          [1,2,3,4,5].map(n=>'<option value="'+n+'"'+(n===sorenessVal?' selected':'')+'>'+n+'</option>').join('') +
        '</select></div>' +
        '<div class="field"><label>Notes (optional)</label><input id="m-wnotes" value="'+esc(notesVal)+'" placeholder="e.g. tight hamstring" /></div>' +
        '<div class="row" style="margin-top:8px;">' +
          (existing ? '<button class="btn btn-danger" id="m-delete">Delete</button>' : '<button class="btn" id="m-cancel">Cancel</button>') +
          '<button class="btn btn-primary" id="m-save">Save</button>' +
        '</div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      const restCb = document.getElementById('m-wrest');
      const sorenessField = document.getElementById('m-wsoreness-field');
      const syncSorenessVisibility = () => { sorenessField.style.display = restCb.checked ? 'none' : 'flex'; };
      restCb.onchange = syncSorenessVisibility;
      syncSorenessVisibility();
      const cancelBtn = document.getElementById('m-cancel');
      if (cancelBtn) cancelBtn.onclick = () => { modal=null; render(); };
      const deleteBtn = document.getElementById('m-delete');
      if (deleteBtn) deleteBtn.onclick = () => { if(confirm('Delete this check-in?')) deleteWellness(modal.entryId); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const date = document.getElementById('m-wdate').value;
        const restDay = document.getElementById('m-wrest').checked;
        const soreness = parseInt(document.getElementById('m-wsoreness').value,10);
        const notes = document.getElementById('m-wnotes').value.trim();
        if (!date) { document.getElementById('m-wdate').style.borderColor='var(--red)'; return; }
        upsertWellness(date, restDay, soreness, notes, modal.entryId); modal=null; render();
      };
    }

    if (modal.type === 'logExpense') {
      const existing = modal.entryId ? expenses.find(x=>x.id===modal.entryId) : null;
      const today = new Date().toISOString().slice(0,10);
      const dateVal = existing ? existing.date : today;
      const categoryVal = existing ? existing.category : EXPENSE_CATEGORIES[0];
      const amountVal = existing ? existing.amount : '';
      const notesVal = existing ? existing.notes : '';
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">'+(existing?'Edit expense':'Log expense')+'</div>' +
        '<div class="field"><label>Category</label><select id="m-xcat">' +
          EXPENSE_CATEGORIES.map(c=>'<option'+(c===categoryVal?' selected':'')+'>'+c+'</option>').join('') +
        '</select></div>' +
        '<div class="field"><label>Amount ($)</label><input id="m-xamount" type="number" min="0" step="0.01" value="'+amountVal+'" placeholder="e.g. 85.00" /></div>' +
        '<div class="field"><label>Date</label><input id="m-xdate" type="date" value="'+dateVal+'" /></div>' +
        '<div class="field"><label>Notes (optional)</label><input id="m-xnotes" value="'+esc(notesVal)+'" placeholder="e.g. hotel — NorCal L5" /></div>' +
        '<div class="row" style="margin-top:8px;">' +
          (existing ? '<button class="btn btn-danger" id="m-delete">Delete</button>' : '<button class="btn" id="m-cancel">Cancel</button>') +
          '<button class="btn btn-primary" id="m-save">Save</button>' +
        '</div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      const cancelBtn = document.getElementById('m-cancel');
      if (cancelBtn) cancelBtn.onclick = () => { modal=null; render(); };
      const deleteBtn = document.getElementById('m-delete');
      if (deleteBtn) deleteBtn.onclick = () => { if(confirm('Delete this expense?')) deleteExpense(modal.entryId); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const category = document.getElementById('m-xcat').value;
        const amount = parseFloat(document.getElementById('m-xamount').value);
        const date = document.getElementById('m-xdate').value;
        const notes = document.getElementById('m-xnotes').value.trim();
        if (!amount || amount<=0) { document.getElementById('m-xamount').style.borderColor='var(--red)'; return; }
        if (!date) { document.getElementById('m-xdate').style.borderColor='var(--red)'; return; }
        if (existing) updateExpense(modal.entryId, date, category, amount, notes);
        else addExpense(date, category, amount, notes);
        modal=null; render();
      };
    }

    if (modal.type === 'editMatch') {
      const m = matches.find(m=>m.id===modal.entryId);
      const d = m ? new Date(m.ts) : new Date();
      const dateStr = d.toISOString().slice(0,10);
      div.innerHTML =
        '<div class="modal-bg" id="modal-bg"><div class="modal">' +
        '<div class="modal-title">Edit match</div>' +
        '<div class="field"><label>Opponent name</label><input id="m-eopp" value="'+esc(m?m.opponent:'')+'" /></div>' +
        '<div class="field"><label>Opponent UTR (optional)</label><input id="m-eutr" type="number" step="0.01" min="0" max="16" value="'+(m&&m.opponentUTR?m.opponentUTR:'')+'" /></div>' +
        '<div class="field"><label>Result</label><select id="m-eresult"><option value="W"'+(m&&m.result==='W'?' selected':'')+'>Win</option><option value="L"'+(m&&m.result==='L'?' selected':'')+'>Loss</option></select></div>' +
        '<div class="field"><label>Score</label><input id="m-escore" value="'+esc(m?m.score:'')+'" /></div>' +
        '<div class="field"><label>Tournament / event (optional)</label><input id="m-etourn" value="'+esc(m?m.tournament:'')+'" /></div>' +
        '<div class="field"><label>Date</label><input id="m-emdate" type="date" value="'+dateStr+'" /></div>' +
        '<div class="field"><label>Notes (optional)</label><input id="m-emnotes" value="'+esc(m?m.notes:'')+'" /></div>' +
        '<div class="row" style="margin-top:8px;"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Save</button></div>' +
        '</div></div>';
      document.getElementById('app').appendChild(div);
      document.getElementById('m-cancel').onclick = () => { modal=null; render(); };
      document.getElementById('modal-bg').onclick = (e)=>{ if(e.target.id==='modal-bg'){ modal=null; render(); } };
      document.getElementById('m-save').onclick = () => {
        const opponent = document.getElementById('m-eopp').value.trim();
        const utrVal = document.getElementById('m-eutr').value;
        const opponentUTR = utrVal ? parseFloat(utrVal) : null;
        const result = document.getElementById('m-eresult').value;
        const score = document.getElementById('m-escore').value.trim();
        const tournament = document.getElementById('m-etourn').value.trim();
        const date = document.getElementById('m-emdate').value;
        const notes = document.getElementById('m-emnotes').value.trim();
        if (!opponent) { document.getElementById('m-eopp').style.borderColor='var(--red)'; return; }
        if (!date) { document.getElementById('m-emdate').style.borderColor='var(--red)'; return; }
        const iso = new Date(date+'T12:00:00').toISOString();
        updateMatch(modal.entryId, opponent, opponentUTR, result, score, tournament, iso, notes); modal=null; render();
      };
    }
  }

  load();
  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
